<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>srvdog</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>srvdog</h1>
        <p>仅通过 SSH 隧道访问的轻量服务器看板</p>
      </div>
      <div class="hero-actions">
        <label>
          保留时长
          <select id="retention">
            <option value="1">1 天</option>
            <option value="3">3 天</option>
            <option value="7" selected>7 天</option>
            <option value="14">14 天</option>
            <option value="30">30 天</option>
          </select>
        </label>
        <label>
          时间范围
          <select id="window">
            <option value="1h">最近 1 小时</option>
            <option value="6h">最近 6 小时</option>
            <option value="24h" selected>最近 24 小时</option>
            <option value="7d">最近 7 天</option>
          </select>
        </label>
        <button id="export-json">导出 JSON</button>
        <button id="export-csv">导出 CSV</button>
        <button id="clear-history" class="danger">清空历史</button>
      </div>
    </header>

    <nav class="tabs" aria-label="页面分区">
      <button class="tab-button active" data-tab="overview">概览</button>
      <button class="tab-button" data-tab="clash">Clash</button>
    </nav>

    <section id="overview-view" class="view">
      <section class="cards" id="cards"></section>

      <section class="charts">
        <article class="panel">
          <h2>CPU %</h2>
          <canvas id="cpu-chart" width="600" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>内存 %</h2>
          <canvas id="memory-chart" width="600" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>磁盘 %</h2>
          <canvas id="disk-chart" width="600" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>网络 KB/s</h2>
          <canvas id="network-chart" width="600" height="180"></canvas>
        </article>
      </section>

      <section class="panel">
        <h2>Docker</h2>
        <table id="docker-table">
          <thead>
            <tr>
              <th>名称</th>
              <th>镜像</th>
              <th>状态</th>
              <th>健康</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </section>

    <section id="clash-view" class="view hidden">
      <div id="clash-notice" class="notice hidden"></div>

      <section class="clash-grid">
        <div class="stack">
          <article class="panel">
            <div class="panel-header">
              <h2>订阅</h2>
              <button id="clash-refresh">刷新</button>
            </div>
            <div id="clash-status" class="status-grid"></div>
            <div class="panel-actions">
              <button id="clash-copy-subscription">复制订阅 URL</button>
              <button id="clash-update-geodata">更新 GeoIP / GeoSite</button>
              <button id="clash-rotate-token" class="danger">轮换 Token</button>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <h2>配置 YAML</h2>
              <span id="clash-config-source" class="badge">已发布</span>
            </div>
            <textarea id="clash-config-editor" class="editor" spellcheck="false"></textarea>
            <div class="panel-actions">
              <button id="clash-config-reload">重新加载</button>
              <button id="clash-config-save">保存草稿</button>
              <button id="clash-config-validate">校验</button>
              <button id="clash-config-publish">发布</button>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <h2>动态脚本</h2>
              <span id="clash-script-source" class="badge">已发布</span>
            </div>
            <textarea id="clash-script-editor" class="editor" spellcheck="false"></textarea>
            <div class="panel-actions">
              <button id="clash-script-reload">重新加载</button>
              <button id="clash-script-save">保存草稿</button>
              <button id="clash-script-validate">校验</button>
              <button id="clash-script-publish">发布</button>
            </div>
          </article>
        </div>

        <div class="stack">
          <article class="panel">
            <div class="panel-header">
              <h2>操作日志</h2>
              <button id="clash-logs-refresh">刷新</button>
            </div>
            <pre id="clash-operations-log" class="log-box"></pre>
          </article>

          <article class="panel">
            <h2>Geo 数据日志</h2>
            <pre id="clash-geodata-log" class="log-box"></pre>
          </article>
        </div>
      </section>
    </section>
  </main>
  <script src="/chart-utils.js"></script>
  <script src="/app.js"></script>
</body>
</html>
