<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>srvdog</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>srvdog</h1>
        <p>Lightweight server watch over SSH tunnel only</p>
      </div>
      <div class="hero-actions">
        <label>
          Retention
          <select id="retention">
            <option value="1">1 day</option>
            <option value="3">3 days</option>
            <option value="7" selected>7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
          </select>
        </label>
        <label>
          Window
          <select id="window">
            <option value="1h">1h</option>
            <option value="6h">6h</option>
            <option value="24h" selected>24h</option>
            <option value="7d">7d</option>
          </select>
        </label>
        <button id="export-json">Export JSON</button>
        <button id="export-csv">Export CSV</button>
        <button id="clear-history" class="danger">Clear history</button>
      </div>
    </header>

    <section class="cards" id="cards"></section>

    <section class="charts">
      <article class="panel">
        <h2>CPU %</h2>
        <canvas id="cpu-chart" width="600" height="180"></canvas>
      </article>
      <article class="panel">
        <h2>Memory %</h2>
        <canvas id="memory-chart" width="600" height="180"></canvas>
      </article>
      <article class="panel">
        <h2>Disk %</h2>
        <canvas id="disk-chart" width="600" height="180"></canvas>
      </article>
      <article class="panel">
        <h2>Network KB/s</h2>
        <canvas id="network-chart" width="600" height="180"></canvas>
      </article>
    </section>

    <section class="panel">
      <h2>Docker</h2>
      <table id="docker-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Image</th>
            <th>Status</th>
            <th>Health</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
