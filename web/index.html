<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>srvdog</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>srvdog</h1>
        <p>Lightweight server watch over SSH tunnel only</p>
      </div>
      <div class="hero-actions">
        <label>
          Retention
          <select id="retention">
            <option value="1">1 day</option>
            <option value="3">3 days</option>
            <option value="7" selected>7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
          </select>
        </label>
        <label>
          Window
          <select id="window">
            <option value="1h">1h</option>
            <option value="6h">6h</option>
            <option value="24h" selected>24h</option>
            <option value="7d">7d</option>
          </select>
        </label>
        <button id="export-json">Export JSON</button>
        <button id="export-csv">Export CSV</button>
        <button id="clear-history" class="danger">Clear history</button>
      </div>
    </header>

    <nav class="tabs" aria-label="Sections">
      <button class="tab-button active" data-tab="overview">Overview</button>
      <button class="tab-button" data-tab="clash">Clash</button>
    </nav>

    <section id="overview-view" class="view">
      <section class="cards" id="cards"></section>

      <section class="charts">
        <article class="panel">
          <h2>CPU %</h2>
          <canvas id="cpu-chart" width="600" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>Memory %</h2>
          <canvas id="memory-chart" width="600" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>Disk %</h2>
          <canvas id="disk-chart" width="600" height="180"></canvas>
        </article>
        <article class="panel">
          <h2>Network KB/s</h2>
          <canvas id="network-chart" width="600" height="180"></canvas>
        </article>
      </section>

      <section class="panel">
        <h2>Docker</h2>
        <table id="docker-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Image</th>
              <th>Status</th>
              <th>Health</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </section>

    <section id="clash-view" class="view hidden">
      <div id="clash-notice" class="notice hidden"></div>

      <section class="clash-grid">
        <div class="stack">
          <article class="panel">
            <div class="panel-header">
              <h2>Subscription</h2>
              <button id="clash-refresh">Refresh</button>
            </div>
            <div id="clash-status" class="status-grid"></div>
            <div class="panel-actions">
              <button id="clash-copy-subscription">Copy Subscription URL</button>
              <button id="clash-update-geodata">Update GeoIP / GeoSite</button>
              <button id="clash-rotate-token" class="danger">Rotate Token</button>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <h2>Config YAML</h2>
              <span id="clash-config-source" class="badge">published</span>
            </div>
            <textarea id="clash-config-editor" class="editor" spellcheck="false"></textarea>
            <div class="panel-actions">
              <button id="clash-config-reload">Reload</button>
              <button id="clash-config-save">Save Draft</button>
              <button id="clash-config-validate">Validate</button>
              <button id="clash-config-publish">Publish</button>
            </div>
          </article>

          <article class="panel">
            <div class="panel-header">
              <h2>Dynamic Script</h2>
              <span id="clash-script-source" class="badge">published</span>
            </div>
            <textarea id="clash-script-editor" class="editor" spellcheck="false"></textarea>
            <div class="panel-actions">
              <button id="clash-script-reload">Reload</button>
              <button id="clash-script-save">Save Draft</button>
              <button id="clash-script-validate">Validate</button>
              <button id="clash-script-publish">Publish</button>
            </div>
          </article>
        </div>

        <div class="stack">
          <article class="panel">
            <div class="panel-header">
              <h2>Operations Log</h2>
              <button id="clash-logs-refresh">Refresh</button>
            </div>
            <pre id="clash-operations-log" class="log-box"></pre>
          </article>

          <article class="panel">
            <h2>Geodata Log</h2>
            <pre id="clash-geodata-log" class="log-box"></pre>
          </article>
        </div>
      </section>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
